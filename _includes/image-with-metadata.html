<figure class="image-metadata-figure">
  <img alt="{{ include.alt }}" src="{{ include.src }}">
  <div class="image-metadata-overlay">
    <span>{{ include.camera }}</span>
    <span>{{ include.focal_length }}</span>
    <span>f/{{ include.aperture }}</span>
    <span>SS {{ include.shutter }}</span>
    <span>ISO {{ include.iso }}</span>
  </div>
</figure>
