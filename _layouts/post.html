---
layout: default
---

<h1>{{ page.title }}</h1>

{% assign words = content | number_of_words %}
{% assign minutes = words | divided_by: 200 | at_least: 1 %}
<p class="text-sm">
  <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time> · {{ minutes }} min read
</p>

{{ content }}

<p class="mt-8 text-sm text-center">
  <a href="/feed.xml">RSS</a> · <a href="https://github.com/remyduthu/remy.duthu.org/edit/main/{{ page.path }}">Suggest an edit</a>
</p>
